<div
  class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/50 p-4"
  role="presentation"
  (click)="onBackdropClick($event)"
>
  <div
    role="dialog"
    aria-modal="true"
    aria-labelledby="deactivate-admin-title"
    class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-xl"
    (click)="$event.stopPropagation()"
  >
    <h2 id="deactivate-admin-title" class="text-lg font-semibold text-slate-900">
      Deactivate administrator?
    </h2>
    <p class="mt-3 text-sm text-slate-600">
      The account
      <span class="font-medium text-slate-800">{{ row.fullName }}</span>
      ({{ row.email }}) will no longer be able to sign in. The school record
      stays in the system; this does not delete data.
    </p>
    @if (error) {
      <p
        class="mt-3 rounded-lg bg-rose-50 px-3 py-2 text-sm text-rose-800"
        role="alert"
      >
        {{ error }}
      </p>
    }
    <div class="mt-6 flex flex-wrap justify-end gap-2">
      <button
        type="button"
        class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="loading"
        (click)="close.emit()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="rounded-lg bg-slate-700 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="loading"
        (click)="confirm.emit()"
      >
        {{ loading ? 'Working…' : 'Deactivate' }}
      </button>
    </div>
  </div>
</div>
