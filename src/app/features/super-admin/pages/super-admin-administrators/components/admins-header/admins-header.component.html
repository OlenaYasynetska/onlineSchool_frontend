<div
  class="mb-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
>
  <h1 class="flex items-center gap-2 text-2xl font-bold text-slate-900">
    <img
      src="/assets/icons/sidebar/employees.svg"
      alt=""
      width="28"
      height="28"
      class="h-7 w-7 shrink-0 object-contain"
      aria-hidden="true"
    />
    Administrators
  </h1>
  <div class="flex flex-wrap items-center gap-2 sm:justify-end">
    <button
      type="button"
      class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-amber-500 text-white shadow-sm transition hover:bg-amber-600"
      aria-label="View options"
    >
      <svg
        class="h-5 w-5"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"
        />
      </svg>
    </button>
    <button
      type="button"
      class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-50"
      aria-label="Filter"
    >
      <svg
        class="h-5 w-5"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591l-5.432 5.432a2.25 2.25 0 00-.659 1.591v2.927a2.25 2.25 0 01-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 00-.659-1.591L3.659 7.409A2.25 2.25 0 013 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z"
        />
      </svg>
    </button>
    <div class="relative min-w-[min(100%,240px)] flex-1 sm:max-w-sm">
      <input
        type="search"
        placeholder="Search admin"
        [value]="search"
        (input)="searchChange.emit($event)"
        class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-10 pr-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-100"
      />
      <span
        class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2"
        aria-hidden="true"
      >
        <img
          src="/assets/icons/about/loupe.svg"
          alt=""
          width="16"
          height="16"
          class="h-4 w-4 shrink-0 object-contain"
          aria-hidden="true"
        />
      </span>
    </div>
  </div>
</div>
