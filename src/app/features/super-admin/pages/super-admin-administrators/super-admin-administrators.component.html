<div class="w-full min-w-0 max-w-full">
  <div
    class="min-h-0 min-w-0 space-y-6 bg-slate-100/80 px-4 pb-8 pt-6 sm:px-6 lg:px-8"
  >
    <app-admins-header
      [search]="adminsUi.adminSearch()"
      (searchChange)="adminsUi.onAdminSearchInput($event)"
    />

    @if (loading) {
      <p class="text-sm text-slate-600">Loading…</p>
    } @else {
      <section
        class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
      >
        <app-admins-table
          [rows]="rows()"
          [filtered]="adminsUi.filteredSchoolAdmins()"
          [deactivatingUserId]="deactivatingUserId()"
          [reactivatingUserId]="reactivatingUserId()"
          (edit)="openEdit($event)"
          (deactivate)="openDeactivateConfirm($event)"
          (reactivate)="openReactivateConfirm($event)"
          (clearSearch)="adminsUi.clearAdminSearch()"
        />
        <app-admins-footer
          [filteredCount]="adminsUi.filteredSchoolAdmins().length"
          [total]="rows().length"
          [active]="activeAdminCount()"
          [inactive]="inactiveAdminCount()"
        />
      </section>
    }
  </div>
</div>

@if (editModalOpen()) {
  <app-admin-edit-modal
    [form]="editForm"
    [error]="saveError()"
    [loading]="saveInProgress()"
    (close)="closeEdit()"
    (submit)="submitEdit()"
  />
}

@if (deactivateTarget(); as dRow) {
  <app-admin-deactivate-modal
    [row]="dRow"
    [loading]="deactivateInProgress()"
    [error]="deactivateError()"
    (confirm)="confirmDeactivate()"
    (close)="closeDeactivateConfirm()"
  />
}

@if (reactivateTarget(); as rRow) {
  <app-admin-reactivate-modal
    [row]="rRow"
    [loading]="reactivateInProgress()"
    [error]="reactivateError()"
    (confirm)="confirmReactivate()"
    (close)="closeReactivateConfirm()"
  />
}
