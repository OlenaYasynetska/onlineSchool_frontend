<div class="w-full min-w-0 max-w-full">
  <div
    class="min-h-0 min-w-0 space-y-8 bg-slate-100/80 px-4 pb-8 pt-6 sm:px-6 lg:px-8"
  >
    <section
      class="rounded-2xl border border-sky-100 bg-sky-50/80 p-4 shadow-sm sm:p-6"
    >
      <div
        class="mb-5 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
      >
        <h1 class="flex items-center gap-2 text-lg font-bold text-slate-900">
          <svg
            class="h-5 w-5 text-slate-600"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"
            />
          </svg>
          Schools
        </h1>
        <div class="flex flex-wrap items-center gap-2 sm:justify-end">
          <button
            type="button"
            class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-amber-500 text-white shadow-sm transition hover:bg-amber-600"
            aria-label="List view"
          >
            <svg
              class="h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"
              />
            </svg>
          </button>
          <button
            type="button"
            class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-50"
            aria-label="Filter"
          >
            <svg
              class="h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591l-5.432 5.432a2.25 2.25 0 00-.659 1.591v2.927a2.25 2.25 0 01-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 00-.659-1.591L3.659 7.409A2.25 2.25 0 013 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z"
              />
            </svg>
          </button>
          <div class="relative min-w-[min(100%,220px)] flex-1 sm:max-w-xs">
            <input
              type="search"
              placeholder="Search school"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-3 pr-10 text-sm text-slate-900 placeholder:text-slate-400 focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-100"
            />
            <span
              class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"
              aria-hidden="true"
            >
              <svg
                class="h-4 w-4"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
                />
              </svg>
            </span>
          </div>
        </div>
      </div>

      @if (loading) {
        <p class="text-sm text-slate-600">Loading…</p>
      } @else if (error) {
        <p class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800">
          {{ error }}
        </p>
      } @else if (schools.length > 0) {
        <div class="grid gap-5 sm:grid-cols-2 xl:grid-cols-4">
          @for (school of schools; track school.id) {
            <app-school-grid-card [school]="school" />
          }
        </div>
      } @else {
        <p
          class="rounded-xl border border-dashed border-slate-200 bg-white/60 py-10 text-center text-sm text-slate-500"
        >
          No schools yet.
        </p>
      }

      @if (!loading && !error) {
        <div
          class="mt-6 flex flex-col items-center gap-3 sm:flex-row sm:items-center sm:justify-between"
        >
          <p class="text-sm text-slate-500">
            Total: {{ schools.length }} schools
          </p>
          <button
            type="button"
            class="rounded-xl bg-slate-700 px-8 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
          >
            Show more
          </button>
        </div>
      }
    </section>
  </div>
</div>
